<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coco - Site Moderno</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg"></div>

<section class="hero">
    <h2>Agro forte, futuro sustentável.</h2>
    <p>Equilíbrio entre produção e meio ambiente.</p>
</section>

<section class="cards">
    <button class="card" onclick="showInfo('info1')">
        <span>​🚜​</span>
        <h3>O que é o Agro</h3>
    </button>

    <button class="card" onclick="showInfo('info2')">
        <span>​🌿​</span>
        <h3>Impactos do Agro</h3>
    </button>

    <button class="card" onclick="showInfo('info3')">
        <span>​​♻️​</span>
        <h3>Solução sutentável</h3>
    </button>
</section>

<div id="info1" class="info-box">
    <h2>o que é o Agro</h2>
    <p>Criamos experiências digitais modernas, rápidas e bonitas.</p>
</div>

<div id="info2" class="info-box">
    <h2>Impactos do Agro</h2>
    <p>Web design, UX/UI, landing pages e sistemas personalizados.</p>
</div>

<div id="info3" class="info-box">
    <h2>Solução sustentável</h2>
    <p>contato@site.com.br</p>
</div>

<script>
function showInfo(id) {
    document.querySelectorAll('.info-box').forEach(box => box.classList.remove('show'));
    document.getElementById(id).classList.add('show');
}

function toggleDarkMode() {
    document.body.classList.toggle('dark');
}

let fontSize = 16;
function changeFontSize() {
    fontSize = fontSize === 16 ? 20 : fontSize === 20 ? 24 : 16;
    document.body.style.fontSize = fontSize + "px";
}
</script>

</body>
</html>
