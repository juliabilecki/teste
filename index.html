<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coco - Site Moderno</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg"></div>

<header>
    <h1>✨ Meu Site Moderno</h1>

    <div class="acessibilidade">
        <button class="glass-btn" onclick="toggleDarkMode()">
            🌙 Tema
        </button>

        <button class="glass-btn" onclick="changeFontSize()">
            🔠 Fonte
        </button>
    </div>
</header>

<section class="hero">
    <h2>Bem-vindo ao futuro</h2>
    <p>Um site com gradientes, glassmorphism e animações suaves.</p>
</section>

<section class="cards">
    <button class="card" onclick="showInfo('info1')">
        <span>🚀</span>
        <h3>Sobre Nós</h3>
    </button>

    <button class="card" onclick="showInfo('info2')">
        <span>💼</span>
        <h3>Serviços</h3>
    </button>

    <button class="card" onclick="showInfo('info3')">
        <span>📞</span>
        <h3>Contato</h3>
    </button>
</section>

<div id="info1" class="info-box">
    <h2>Sobre Nós</h2>
    <p>Criamos experiências digitais modernas, rápidas e bonitas.</p>
</div>

<div id="info2" class="info-box">
    <h2>Serviços</h2>
    <p>Web design, UX/UI, landing pages e sistemas personalizados.</p>
</div>

<div id="info3" class="info-box">
    <h2>Contato</h2>
    <p>contato@site.com.br</p>
</div>

<script>
function showInfo(id) {
    document.querySelectorAll('.info-box').forEach(box => box.classList.remove('show'));
    document.getElementById(id).classList.add('show');
}

function toggleDarkMode() {
    document.body.classList.toggle('dark');
}

let fontSize = 16;
function changeFontSize() {
    fontSize = fontSize === 16 ? 20 : fontSize === 20 ? 24 : 16;
    document.body.style.fontSize = fontSize + "px";
}
</script>

</body>
</html>
